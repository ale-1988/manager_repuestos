{% extends "base.html" %}
{% load static %}

{% block contenido %}

<div id="api-urls"
     data-api-consultar-ns="{% url 'pedidos:api_consultar_ns' %}"
     data-api-buscar-equipos="{% url 'pedidos:api_buscar_equipos' %}"
     data-api-buscar-materiales="{% url 'pedidos:api_buscar_materiales' %}"
     data-api-lista-materiales="{% url 'pedidos:api_lista_materiales_equipo' %}"
     data-api-agregar-item="{% url 'pedidos:api_agregar_item' %}"
     data-api-grupos="{% url 'repuestos:api_grupos' %}">
</div>

<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h3>Agregar ítems al Pedido #{{ pedido.id }}</h3>

        <small class="text-muted">
            Cliente: {{ cliente.nombre }}
            {% if cliente.cuit %}
                ({{ cliente.cuit }})
            {% endif %}
            — Estado: {{ pedido.estado }}
        </small>
    </div>

    <a href="{% url 'pedidos:editar' pedido.id %}"
       class="btn btn-secondary"
       title="Volver al pedido">

        <i class="bi bi-arrow-left"></i>

    </a>
</div>

<hr>

<form id="csrf-form" style="display:none;">
    {% csrf_token %}
</form>

<div class="mb-3">

    <label class="form-label">
        <strong>Modo de ingreso:</strong>
    </label>

    <div class="form-check">
        <input class="form-check-input modo-radio"
               type="radio"
               name="modo"
               id="modo_ns"
               value="ns">

        <label class="form-check-label" for="modo_ns">
            Ingresar NS
        </label>
    </div>

    <div class="form-check">
        <input class="form-check-input modo-radio"
               type="radio"
               name="modo"
               id="modo_equipo"
               value="equipo">

        <label class="form-check-label" for="modo_equipo">
            Ingresar Equipo
        </label>
    </div>

    <div class="form-check">
        <input class="form-check-input modo-radio"
               type="radio"
               name="modo"
               id="modo_desc"
               value="desc">

        <label class="form-check-label" for="modo_desc">
            Ingresar Descripción
        </label>
    </div>

</div>

<div id="zona_ns" class="card p-3 mb-3 d-none">

    <div class="row g-2 align-items-center">

        <div class="col-md-4">
            <input id="ns_input"
                   class="form-control"
                   placeholder="Número de serie">
        </div>

        <div class="col-md-2">
            <button id="btn_consultar_ns"
                    class="btn btn-primary w-30"
                    type="button" title="Consultar">
                    <i class="bi bi-search fs-5"></i>
            </button>
        </div>

        <div class="col-md-6">

            <div id="ns_equipo_nombre"
                 class="fw-bold text-primary mb-1">
            </div>

            <span id="ns_resultado" class="fw-bold"></span>

            <div id="ns_garantia_info"
                 class="small text-muted">
            </div>

        </div>

    </div>

    <div class="mt-3">

        <button id="btn_bom_ns"
                class="btn btn-outline-primary d-none"
                type="button">

            Seleccionar de la lista de materiales

        </button>

    </div>

</div>

<div id="zona_equipo" class="card p-3 mb-3 d-none">

    <div class="row g-2 align-items-center">

        <div class="col-md-6">

            <input id="equipo_input"
                   class="form-control"
                   placeholder="Buscar equipo por nombre o descripción">

        </div>

        <div class="col-md-3 form-check">

            <input id="chk_equipo_obsoletos"
                   class="form-check-input"
                   type="checkbox">

            <label class="form-check-label">
                Ver obsoletos
            </label>

        </div>

    </div>

    <div id="equipo_resultados" class="mt-3"></div>

</div>

<div id="zona_desc" class="card p-3 mb-3 d-none">

    <div class="row g-2 align-items-center">

        <div class="col-md-3">

            <select id="grupo_select" class="form-select">
                <option value="---">Todos</option>
            </select>

        </div>

        <div class="col-md-5">

            <input id="desc_input"
                   class="form-control"
                   placeholder="Buscar material por nombre o descripción">

        </div>

        <div class="col-md-3 form-check">

            <input id="chk_desc_obsoletos"
                   class="form-check-input"
                   type="checkbox">

            <label class="form-check-label">
                Ver obsoletos
            </label>

        </div>

    </div>

    <div id="desc_resultados" class="mt-3"></div>

</div>

<div id="zona_lista_materiales"
     class="mt-4 d-none">

    <h5 id="lista_titulo"></h5>

    <div id="lista_materiales"></div>

</div>

<script>
    const pedidoId = {{ pedido.id }};
</script>

<script src="{% static 'js/pedidos_agregar_item.js' %}"></script>

{% endblock %}
