{% extends "base.html" %}

{% block contenido %}

<h2>Entregas</h2>

<table class="table table-striped table-hover">

    <thead class="table-light">
        <tr>
            <th>Nº</th>
            <th>Cliente</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th></th>
        </tr>
    </thead>

    <tbody>

    {% for pedido in pedidos %}

        <tr>

            <td>{{ pedido.id }}</td>

            <td>{{ pedido.cliente }}</td>

            <td>{{ pedido.estado }}</td>

            <td>{{ pedido.fecha|date:"d/m/Y" }}</td>

            <td class="text-end">

                <a class="btn btn-sm btn-primary"
                   href="{% url 'logistica:detalle_entregas' pedido.id %}">
                   Ver
                </a>

            </td>

        </tr>

    {% empty %}

        <tr>
            <td colspan="5" class="text-center">
                No hay pedidos pendientes de entrega
            </td>
        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
