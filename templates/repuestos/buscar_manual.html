{% extends "base.html" %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/repuestos.css' %}">
{% block contenido %}

<div class="row">
    <div class="col-xl-11 mx-auto">

        <div class="card shadow-sm">

            <div class="card-body">

                <h2 class="mb-4">
                    Catálogo de Repuestos
                </h2>

                <!-- FORMULARIO -->
                <form method="GET" id="frm" onsubmit="return false;">

                    <div class="row g-3 align-items-end">

                        <div class="col-md-5">
                            <label class="form-label">
                                Texto
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="texto"
                                id="texto"
                                value="{{ texto }}"
                                oninput="actualizarBusqueda()"
                                autocomplete="off"
                            >
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">
                                Grupo
                            </label>

                            <select
                                class="form-select"
                                name="grupo"
                                id="grupo"
                                onchange="actualizarBusqueda()"
                            >

                                <option value="---">
                                    --- Todos ---
                                </option>

                                {% for g in grupos %}
                                    <option
                                        value="{{ g.GRUPO }}"
                                        {% if g.GRUPO == grupo %}selected{% endif %}
                                    >
                                        {{ g.GRUPO }}
                                    </option>
                                {% endfor %}

                            </select>
                        </div>

                        <div class="col-md-3">

                            <div class="form-check mb-2">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    name="mostrar_obsoletos"
                                    id="mostrar_obsoletos"
                                    onchange="actualizarBusqueda()"
                                    {% if mostrar_obsoletos %}checked{% endif %}
                                >

                                <label class="form-check-label">
                                    Mostrar obsoletos
                                </label>

                            </div>

                        </div>

                    </div>

                    <!-- parámetros ocultos -->
                    <input type="hidden" id="orden" name="orden" value="{{ orden }}">
                    <input type="hidden" id="dir" name="dir" value="{{ direccion }}">

                </form>

                <hr>

                {% include "repuestos/partials/resultados_busqueda.html" %}

            </div>

        </div>

    </div>
</div>

<<script>

function ordenar(campo) {

    document.getElementById("orden").value = campo;

    let dirActual = document.getElementById("dir").value;
    let ordenActual =
        document.getElementById("orden").value;

    if (ordenActual === campo) {

        document.getElementById("dir").value =
            (dirActual === "asc") ? "desc" : "asc";

    } else {

        document.getElementById("dir").value = "asc";

    }

    actualizarBusqueda();
}

function actualizarBusqueda() {

    const texto = document.getElementById("texto").value;
    const grupo = document.getElementById("grupo").value;
    const mostrar = document.getElementById("mostrar_obsoletos").checked ? "on" : "";
    const orden = document.getElementById("orden").value;
    const dir = document.getElementById("dir").value;

    const params =
        `?texto=${encodeURIComponent(texto)}`
        + `&grupo=${encodeURIComponent(grupo)}`
        + `&mostrar_obsoletos=${mostrar}`
        + `&orden=${orden}`
        + `&dir=${dir}`;

    fetch(params)
        .then(response => response.text())
        .then(html => {

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");

            const nuevoContenido =
                doc.querySelector("#resultados").innerHTML;

            document.querySelector("#resultados").innerHTML =
                nuevoContenido;

        });
}

</script>

{% endblock %}
