<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 10px;
            margin: 6px 0 12px;
            border: 1px solid #bbb;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .login-button {
            width: 56px;
            height: 56px;
            background: #009eed;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
            margin-left: auto;
        }

        .login-button:hover {
            background: #0053b3;
        }

        .login-button i {
            font-size: 1.8rem;
        }

        .login-actions {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .messages {
            color: red;
            margin-bottom: 10px;
            text-align: center;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 15px;
        }

        .forgot-password {
            font-size: 0.9rem;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-card">

        <div class="logo-container">
            <img src="{% static 'images/favicon.png' %}"
                alt="Logo"
                height="50">
        </div>

        <h2>Manager de Repuestos</h2>

        <p style="text-align:center; margin-top:-10px; margin-bottom:20px;">
            Bienvenido, por favor inicie sesión
        </p>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Usuario</label>
            <input type="text"
                name="username"
                required
                autofocus>

            <label>Contraseña</label>
            <input type="password"
                name="password"
                required>

            <div class="login-actions">
                <a href="{% url 'sesiones:password_reset' %}" class="forgot-password">
                    Recuperar contraseña                    
                </a>
                <button type="submit"
                        class="login-button" title="Ingresar">
                    <i class="bi bi-box-arrow-in-right fs-6"></i>
                </button>
            </div>
        </form>

    </div>
</body>
</html>
