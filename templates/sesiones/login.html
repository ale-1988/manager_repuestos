<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <title>Iniciar sesión</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


</head>

<body>
    <div class="login-card">

        <div class="logo-container">
            <img src="{% static 'images/favicon.png' %}"
                alt="Logo"
                height="50">
        </div>

        <h2>Manager de Repuestos</h2>

        <p style="text-align:center; margin-top:-10px; margin-bottom:20px;">
            Bienvenido, por favor inicie sesión
        </p>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Usuario</label>
            <input type="text"
                name="username"
                required
                autofocus>

            <label>Contraseña</label>
            <input type="password"
                name="password"
                required>

            <div class="login-actions">
                <a href="{% url 'sesiones:password_reset' %}" class="forgot-password">
                    Recuperar contraseña                    
                </a>
                <button type="submit"
                        class="login-button" title="Ingresar">
                    <i class="bi bi-box-arrow-in-right fs-6"></i>
                </button>
            </div>
        </form>

    </div>
</body>
</html>
